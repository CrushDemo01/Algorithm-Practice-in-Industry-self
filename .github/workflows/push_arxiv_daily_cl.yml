name: push_arxiv_daily_cl

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,8,14,20 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_CL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_CL || 'cs.CL' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '5' }}
      PROMPT: ${{ secrets.PROMPT_CL || '筛选NLP与大模型领域的高质量论文，需与推荐/搜索/广告场景相关。核心方向：大模型用于推荐/搜索、对话式推荐、意图理解、查询改写、文本召回/排序、prompt工程、RAG应用。优先考虑：工业应用导向、顶会论文（ACL/EMNLP/NAACL/KDD）、可落地方案。排除：纯NLP基础研究（与推荐/搜索无关）。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir tqdm requests openai

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(cl): update arxiv cache [skip ci]

          - Added new papers from cs.CL
          - Auto-generated by GitHub Actions"
          git push
