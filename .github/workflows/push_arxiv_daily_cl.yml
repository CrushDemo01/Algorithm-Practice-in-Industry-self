name: push_arxiv_daily_cl

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,8,14,20 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_CL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_CL || 'cs.CL' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      PRECISION_MODE: ${{ secrets.PRECISION_MODE || '1' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '6.5' }}
      PROMPT: ${{ secrets.PROMPT_CL || '精度优先：仅保留与推荐/搜索/广告直接相关的 NLP/LLM 论文。必须：检索/排序/重排、query理解/改写、意图识别、RAG检索增强、对话式推荐/搜索、用户建模、广告文案与点击意图等。优先：真实检索/推荐数据集与指标，在线或系统约束（延迟/成本），明确可落地方案。排除：与检索/推荐/广告无关的通用NLP（翻译/生成/语法等）、纯prompt花活、纯benchmark报告、无实证结果。评分只依据标题+摘要明确陈述。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(cl): update arxiv cache [skip ci]

          - Added new papers from cs.CL
          - Auto-generated by GitHub Actions"
          git push
