name: push_arxiv_daily_ir

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,7,13,19 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30  # 添加超时限制，防止挂起
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_IR }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_IR || 'cs.IR' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '5' }}
      PROMPT: ${{ secrets.PROMPT_IR || '筛选推荐系统、搜索与信息检索领域的高质量论文。核心方向：召回/排序/重排模型、用户建模、冷启动、多目标优化、大模型应用于推荐/搜索。优先考虑：工业界知名公司（Google/Meta/字节/阿里等）、顶会论文（SIGIR/RecSys/KDD/WWW）、可落地方案。排除：纯理论、非推荐/搜索领域论文。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 升级到 v4
        with:
          fetch-depth: 1  # 只拉取最新 commit，加快速度

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5  # 升级到 v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # 启用 pip 缓存，加速依赖安装

      - name: Install dependencies
        run: pip install --no-cache-dir tqdm requests openai

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false  # 如果脚本失败，停止工作流

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(ir): update arxiv cache [skip ci]

          - Added new papers from cs.IR
          - Auto-generated by GitHub Actions"
          git push
