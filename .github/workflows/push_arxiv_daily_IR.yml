name: push_arxiv_daily_ir

env:
  PYTHON_VERSION: "3.10" # set this to the Python version to use
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,7,13,19 * * *' # 从UTC 1点开始每6小时（1/7/13/19点）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_ir }}
      LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LLM_BASE_URL: "https://api.deepseek.com"
      LLM_MODEL: "deepseek-chat"
      QUERY: "cs.IR"
      LIMITS: 10
      MIN_SCORE: 5
      PROMPT: "筛选推荐系统、搜索与信息检索领域的高质量论文。核心方向：召回/排序/重排模型、用户建模、冷启动、多目标优化、大模型应用于推荐/搜索。优先考虑：工业界知名公司（Google/Meta/字节/阿里等）、顶会论文（SIGIR/RecSys/KDD/WWW）、可落地方案。排除：纯理论、非推荐/搜索领域论文。"
      # 评分权重配置（可选）
      # SCORE_INNOVATION: 3
      # SCORE_QUALITY: 3
      # SCORE_PRACTICAL: 2
      # SCORE_IMPACT: 2

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install tqdm requests openai

      - name: PUSH ARXIV DAILY
        run: python arxiv.py

      - name: Commit files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
             echo "push=false" >> $GITHUB_OUTPUT
          else
             git commit -m "chore: update confs" -a
             echo "push=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Push changes
        if: steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
