name: push_arxiv_daily_lg

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,12,17,23 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_LG }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_LG || 'cs.LG' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      PRECISION_MODE: ${{ secrets.PRECISION_MODE || '1' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '6.5' }}
      PROMPT: ${{ secrets.PROMPT_LG || '精度优先：仅保留与推荐/搜索/广告直接相关、且方法贡献清晰的 ML 论文。必须：CTR/CVR/多目标预估、多任务学习、排序/学习排序、召回与向量检索、强化学习用于推荐、GNN用于推荐、因果与去偏、联邦/隐私在推荐广告。优先：真实业务指标或公开数据集、系统约束（延迟/成本）、可复现设置、充分对比与消融。排除：与推荐/搜索/广告无关的通用ML、纯理论无实证、纯survey、仅更大模型/更长训练无新点。评分只依据标题+摘要明确陈述。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(lg): update arxiv cache [skip ci]

          - Added new papers from cs.LG
          - Auto-generated by GitHub Actions"
          git push

