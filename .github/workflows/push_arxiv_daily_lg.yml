name: push_arxiv_daily_lg

env:
  PYTHON_VERSION: "3.10" # set this to the Python version to use
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 5,12,17,23 * * *' # 从UTC 1点开始每6小时（1/7/13/19点）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_CL }}
      LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LLM_BASE_URL: "https://api.deepseek.com"
      LLM_MODEL: "deepseek-chat"
      QUERY: "cs.LG"
      LIMITS: 10
      MIN_SCORE: 5
      PROMPT: "筛选机器学习领域与推荐/搜索/广告相关的高质量论文。核心方向：推荐系统算法、CTR/CVR预估、多任务学习、强化学习用于推荐、图神经网络、AutoML、联邦学习。优先考虑：工业应用价值、顶会论文（ICML/NeurIPS/KDD）、大厂实践、可复现方案。排除：与推荐/搜索/广告无关的纯ML理论研究。"
      # 评分权重配置（可选）
      # SCORE_INNOVATION: 3
      # SCORE_QUALITY: 3
      # SCORE_PRACTICAL: 2
      # SCORE_IMPACT: 2


    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install tqdm requests openai


      - name: PUSH ARXIV DAILY
        run: python arxiv.py

      - name: Commit files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
             echo "push=false" >> $GITHUB_OUTPUT
          else
             git commit -m "chore: update confs" -a
             echo "push=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Push changes
        if: steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}


