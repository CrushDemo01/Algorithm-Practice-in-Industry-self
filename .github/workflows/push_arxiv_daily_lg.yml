name: push_arxiv_daily_lg

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,12,17,23 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_LG }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_LG || 'cs.LG' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '5' }}
      PROMPT: ${{ secrets.PROMPT_LG || '筛选机器学习领域与推荐/搜索/广告相关的高质量论文。核心方向：推荐系统算法、CTR/CVR预估、多任务学习、强化学习用于推荐、图神经网络、AutoML、联邦学习。优先考虑：工业应用价值、顶会论文（ICML/NeurIPS/KDD）、大厂实践、可复现方案。排除：与推荐/搜索/广告无关的纯ML理论研究。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir tqdm requests openai

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(lg): update arxiv cache [skip ci]

          - Added new papers from cs.LG
          - Auto-generated by GitHub Actions"
          git push


