name: push_arxiv_daily_cv

env:
  PYTHON_VERSION: "3.10" # set this to the Python version to use
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,10,16,22 * * *' # 从UTC 1点开始每6小时（1/7/13/19点）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_cv }}
      LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LLM_BASE_URL: "https://api.deepseek.com"
      LLM_MODEL: "deepseek-chat"
      QUERY: "cs.CV"
      LIMITS: 10
      MIN_SCORE: 5
      PROMPT: "筛选计算机视觉领域的Low-Level视觉与图像修复方向论文。核心方向：图像去反射/去噪/去模糊、超分辨率、图像修复/增强、All-in-One统一模型、轻量化模型。优先考虑：实用性强、工业可部署、顶会论文（CVPR/ICCV/ECCV）、SOTA方法。排除：High-Level视觉（检测/分割/识别）、纯理论无应用场景。"
      # 评分权重配置（可选）
      # SCORE_INNOVATION: 3
      # SCORE_QUALITY: 3
      # SCORE_PRACTICAL: 2
      # SCORE_IMPACT: 2

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install tqdm requests openai

      - name: PUSH ARXIV DAILY
        run: python arxiv.py

      - name: Commit files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
             echo "push=false" >> $GITHUB_OUTPUT
          else
             git commit -m "chore: update confs" -a
             echo "push=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Push changes
        if: steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}


