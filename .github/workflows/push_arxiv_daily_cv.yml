name: push_arxiv_daily_cv

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,10,16,22 * * *' # 每6小时运行一次（UTC时间）

jobs:
  daily-push:
    runs-on: ubuntu-latest
    environment: Algorithm-Practice-in-Industry-self   # 👈 关键
    timeout-minutes: 30
    env:
      FEISHU_URL: ${{ secrets.FEISHU_URL_CV }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
      QUERY: ${{ secrets.QUERY_CV || 'cs.CV' }}
      LIMITS: ${{ secrets.LIMITS || '10' }}
      MIN_SCORE: ${{ secrets.MIN_SCORE || '5' }}
      PROMPT: ${{ secrets.PROMPT_CV || '筛选计算机视觉领域的Low-Level视觉与图像修复方向论文。核心方向：图像去反射/去噪/去模糊、超分辨率、图像修复/增强、All-in-One统一模型、轻量化模型。优先考虑：实用性强、工业可部署、顶会论文（CVPR/ICCV/ECCV）、SOTA方法。排除：High-Level视觉（检测/分割/识别）、纯理论无应用场景。' }}
      SCORE_INNOVATION: ${{ secrets.SCORE_INNOVATION || '3' }}
      SCORE_QUALITY: ${{ secrets.SCORE_QUALITY || '3' }}
      SCORE_PRACTICAL: ${{ secrets.SCORE_PRACTICAL || '2' }}
      SCORE_IMPACT: ${{ secrets.SCORE_IMPACT || '2' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv paper fetcher
        run: python arxiv.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add arxiv_ids.json
          git commit -m "chore(cv): update arxiv cache [skip ci]

          - Added new papers from cs.CV
          - Auto-generated by GitHub Actions"
          git push


